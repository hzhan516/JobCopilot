# /backend/app/src/main/resources/application.yml
# 主配置文件 / Main configuration file

spring:
  application:
    name: jobcopilot-backend

  # 激活的 profile / Active profile
  profiles:
    active: dev

  # Jackson 序列化配置 / Jackson serialization config
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# 服务器配置 / Server config
server:
  servlet:
    context-path: /api

# 应用版本信息 / Application version info
app:
  version: ${APP_VERSION:dev}

info:
  app:
    name: JobCopilot
    version: ${APP_VERSION:dev}
    description: AI-powered resume assistant

management:
  info:
    env:
      enabled: true