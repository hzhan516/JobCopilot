# 通用错误 / Common Errors
error.system=系统繁忙，请稍后重试 / System busy, please try again later
error.not.found=资源不存在 / Resource not found
error.invalid.request=请求参数无效 / Invalid request parameters
error.unauthorized=未授权访问 / Unauthorized access
error.forbidden=禁止访问 / Forbidden

# 用户认证 / Authentication
auth.error.email.exists=该邮箱已被注册 / This email is already registered
auth.error.email.not.found=邮箱不存在 / Email not found
auth.error.password.wrong=密码错误 / Incorrect password
auth.error.credentials.invalid=邮箱或密码错误 / Invalid email or password
auth.error.email.not.verified=邮箱未验证 / Email not verified
auth.error.token.expired=登录已过期，请重新登录 / Token expired, please login again
auth.error.token.invalid=无效的登录凭证 / Invalid token
auth.success.register=注册成功 / Registration successful
auth.success.login=登录成功 / Login successful

# 参数校验 / Validation
validation.email.required=邮箱不能为空 / Email is required
validation.email.invalid=邮箱格式不正确 / Invalid email format
validation.password.required=密码不能为空 / Password is required
validation.password.length=密码长度需在{min}-{max}位之间 / Password must be between {min} and {max} characters

# 用户资料 / User Profile
profile.error.not.found=用户资料不存在 / User profile not found
profile.update.success=资料更新成功 / Profile updated successfully

# 参数校验
validation.failed=请求参数校验失败 / Request validation failed

# 存储相关
storage.upload.failed=文件上传失败 / File upload failed
storage.download.failed=文件下载失败 / File download failed
storage.delete.failed=文件删除失败 / File delete failed
storage.check.failed=文件检查失败 / File check failed
storage.presign.failed=生成链接失败 / Failed to generate link
storage.file.not.found=文件不存在 / File not found

# 简历相关
validation.file.required=请选择文件 / Please select a file
resume.upload.success=简历上传成功 / Resume uploaded successfully
resume.upload.type.invalid=不支持的文件格式 / Unsupported file format
resume.upload.size.exceeded=文件大小超过限制 / File size exceeded