# /backend/app/src/main/resources/application-dev.yml
spring:
  application:
    name: ${SPRING_APPLICATION_NAME:resume-assistant-backend}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 2.0

  # 数据源配置 PostgreSQL + pgvector
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resume_assistant}
    username: ${SPRING_DATASOURCE_USERNAME:resume_user}
    password: ${SPRING_DATASOURCE_PASSWORD:resume_pass}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

  # 禁用 Flyway（开发环境）
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:86400000}      # 24小时（开发方便）
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}   # 7天

# ============================================
# 文件存储配置
# 支持类型: minio, local, s3, oss
# 切换存储源只需修改 STORAGE_TYPE 环境变量或下方 type 值
# ============================================
storage:
  type: ${STORAGE_TYPE:minio}
  
  # ----------------------------------------
  # MinIO 配置（当 type=minio 时生效）
  # ----------------------------------------
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:resumes}
    connect-timeout: ${MINIO_CONNECT_TIMEOUT:5000}
    write-timeout: ${MINIO_WRITE_TIMEOUT:60000}
    read-timeout: ${MINIO_READ_TIMEOUT:30000}
  
  # ----------------------------------------
  # 本地存储配置（当 type=local 时生效）
  # ----------------------------------------
  local:
    base-path: ${LOCAL_STORAGE_BASE_PATH:./uploads}
    resume-path: ${LOCAL_STORAGE_RESUME_PATH:resumes}
    date-subdirectory: ${LOCAL_STORAGE_DATE_SUBDIR:true}
    url-prefix: ${LOCAL_STORAGE_URL_PREFIX:}  # 可配置为 nginx 代理地址
  
  # ----------------------------------------
  # AWS S3 配置（当 type=s3 时生效）
  # ----------------------------------------
  s3:
    # AWS 区域，如: us-east-1, ap-northeast-1, cn-north-1
    region: ${AWS_S3_REGION:us-east-1}
    # 自定义端点（用于兼容 S3 的第三方存储，如 MinIO、Ceph）
    # 留空则使用 AWS 官方默认端点
    endpoint: ${AWS_S3_ENDPOINT:}
    # 访问密钥
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    # 存储桶名称
    bucket-name: ${AWS_S3_BUCKET_NAME:}
    # 存储桶路径风格: true=PathStyle, false=VirtualHostedStyle
    path-style-access: ${AWS_S3_PATH_STYLE:false}
    # 连接超时（毫秒）
    connection-timeout: ${AWS_S3_CONNECTION_TIMEOUT:5000}
    # Socket 超时（毫秒）
    socket-timeout: ${AWS_S3_SOCKET_TIMEOUT:50000}
    # 最大连接数
    max-connections: ${AWS_S3_MAX_CONNECTIONS:50}
    # 是否启用加密
    encryption-enabled: ${AWS_S3_ENCRYPTION_ENABLED:false}
    # KMS 密钥 ID（启用加密时使用）
    kms-key-id: ${AWS_S3_KMS_KEY_ID:}
  
  # ----------------------------------------
  # 阿里云 OSS 配置（当 type=oss 时生效）
  # ----------------------------------------
  oss:
    # 访问域名/端点
    # 外网 Endpoint: https://oss-{region}.aliyuncs.com
    # 内网 Endpoint: https://oss-{region}-internal.aliyuncs.com
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    # 访问密钥 ID
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    # 访问密钥密码
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    # 存储桶名称
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    # 访问域名（用于生成访问 URL）
    # 默认 Endpoint: https://{bucket-name}.oss-{region}.aliyuncs.com
    # 自定义域名: https://cdn.yourdomain.com
    cdn-domain: ${ALIYUN_OSS_CDN_DOMAIN:}
    # 连接超时（毫秒）
    connection-timeout: ${ALIYUN_OSS_CONNECTION_TIMEOUT:5000}
    # Socket 超时（毫秒）
    socket-timeout: ${ALIYUN_OSS_SOCKET_TIMEOUT:50000}
    # 最大连接数
    max-connections: ${ALIYUN_OSS_MAX_CONNECTIONS:50}
    # 下载缓冲区大小（KB）
    download-buffer-size: ${ALIYUN_OSS_DOWNLOAD_BUFFER:64}
    # 上传分片大小（MB，用于大文件分片上传）
    upload-part-size: ${ALIYUN_OSS_UPLOAD_PART_SIZE:5}
    # 服务器端加密方式: AES256, KMS, SM4
    # 留空表示不加密
    server-side-encryption: ${ALIYUN_OSS_SSE:}
    # KMS 密钥 ID（加密方式为 KMS 时使用）
    kms-key-id: ${ALIYUN_OSS_KMS_KEY_ID:}

# 日志
logging:
  level:
    org.hibernate.SQL: ${LOG_HIBERNATE_LEVEL:DEBUG}
    edu.asu.ser594.resumeassistant: ${LOG_APP_LEVEL:DEBUG}

# ============================================
# RabbitMQ 消息队列配置
