# /backend/app/src/main/resources/application-dev.yml
# 开发环境配置 / Development environment configuration

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:resume-assistant-backend}

  # RabbitMQ 配置 / RabbitMQ configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 2.0

  # 数据源配置 PostgreSQL + pgvector / Data source config PostgreSQL + pgvector
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resume_assistant}
    username: ${SPRING_DATASOURCE_USERNAME:resume_user}
    password: ${SPRING_DATASOURCE_PASSWORD:resume_pass}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

  # Flyway 数据库迁移 / Database migrations
  # 开发环境禁用 Flyway，改用 docker-entrypoint-initdb.d 的 init.sql 初始化
  # Flyway disabled in dev; use docker-entrypoint-initdb.d init.sql instead
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# 应用级配置 / Application-level configuration
app:
  embedding:
    dimension: ${LLM_EMBEDDING_MODEL_DIMENSION:1536}
    model-version: ${LLM_EMBEDDING_MODEL:gemini/gemini-embedding-001}
  search:
    max-limit: ${SEARCH_MAX_LIMIT:100}
  email:
    enabled: ${EMAIL_VERIFICATION_ENABLED:false}
    from: ${EMAIL_FROM:noreply@resume-assistant.local}
    code-expiry-seconds: ${EMAIL_CODE_EXPIRY:300}
    resend-cooldown-seconds: ${EMAIL_RESEND_COOLDOWN:60}
    max-attempts: ${EMAIL_MAX_ATTEMPTS:3}
  rabbitmq:
    queue:
      res:
        job-parse: backend.queue.job.parse
        resume-parse: backend.queue.resume.parse
        conversation: backend.queue.conversation
        job-rank: backend.queue.job.rank

# AI 服务连接地址 / AI service connection URL
ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}

# JWT 配置 / JWT configuration
jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:86400000}      # 24小时（开发方便）/ 24 hours (convenient for dev)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}   # 7天 / 7 days

# ============================================
# 文件存储配置 / File storage configuration
# 支持类型: minio, local, s3, oss / Supported types: minio, local, s3, oss
# 切换存储源只需修改 STORAGE_TYPE 环境变量或下方 type 值
# Switch storage source by modifying STORAGE_TYPE env var or the type value below
# ============================================
storage:
  type: ${STORAGE_TYPE:minio}
  
  # ----------------------------------------
  # MinIO 配置（当 type=minio 时生效）/ MinIO config (effective when type=minio)
  # ----------------------------------------
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:resumes}
    connect-timeout: ${MINIO_CONNECT_TIMEOUT:5000}
    write-timeout: ${MINIO_WRITE_TIMEOUT:60000}
    read-timeout: ${MINIO_READ_TIMEOUT:30000}
  
  # ----------------------------------------
  # 本地存储配置（当 type=local 时生效）/ Local storage config (effective when type=local)
  # ----------------------------------------
  local:
    base-path: ${LOCAL_STORAGE_BASE_PATH:./uploads}
    resume-path: ${LOCAL_STORAGE_RESUME_PATH:resumes}
    date-subdirectory: ${LOCAL_STORAGE_DATE_SUBDIR:true}
    url-prefix: ${LOCAL_STORAGE_URL_PREFIX:}  # 可配置为 nginx 代理地址 / Can be set to nginx proxy address
  
  # ----------------------------------------
  # AWS S3 配置（当 type=s3 时生效）/ AWS S3 config (effective when type=s3)
  # ----------------------------------------
  s3:
    # AWS 区域，如: us-east-1, ap-northeast-1, cn-north-1 / AWS region, e.g. us-east-1, ap-northeast-1, cn-north-1
    region: ${AWS_S3_REGION:us-east-1}
    # 自定义端点（用于兼容 S3 的第三方存储，如 MinIO、Ceph）
    # Custom endpoint (for S3-compatible third-party storage like MinIO, Ceph)
    # 留空则使用 AWS 官方默认端点 / Leave empty to use official AWS endpoint
    endpoint: ${AWS_S3_ENDPOINT:}
    # 访问密钥 / Access key
    access-key: ${AWS_S3_ACCESS_KEY:}
    secret-key: ${AWS_S3_SECRET_KEY:}
    # 存储桶名称 / Bucket name
    bucket-name: ${AWS_S3_BUCKET_NAME:}
    # 存储桶路径风格: true=PathStyle, false=VirtualHostedStyle / Bucket path style
    path-style-access: ${AWS_S3_PATH_STYLE:false}
    # 连接超时（毫秒）/ Connection timeout (ms)
    connection-timeout: ${AWS_S3_CONNECTION_TIMEOUT:5000}
    # Socket 超时（毫秒）/ Socket timeout (ms)
    socket-timeout: ${AWS_S3_SOCKET_TIMEOUT:50000}
    # 最大连接数 / Max connections
    max-connections: ${AWS_S3_MAX_CONNECTIONS:50}
    # 是否启用加密 / Whether to enable encryption
    encryption-enabled: ${AWS_S3_ENCRYPTION_ENABLED:false}
    # KMS 密钥 ID（启用加密时使用）/ KMS key ID (used when encryption is enabled)
    kms-key-id: ${AWS_S3_KMS_KEY_ID:}
  
  # ----------------------------------------
  # 阿里云 OSS 配置（当 type=oss 时生效）/ Aliyun OSS config (effective when type=oss)
  # ----------------------------------------
  oss:
    # 访问域名/端点 / Access endpoint
    # 外网 Endpoint: https://oss-{region}.aliyuncs.com / Public endpoint
    # 内网 Endpoint: https://oss-{region}-internal.aliyuncs.com / Internal endpoint
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    # 访问密钥 ID / Access key ID
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    # 访问密钥密码 / Access key secret
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    # 存储桶名称 / Bucket name
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    # 访问域名（用于生成访问 URL）/ CDN domain (for generating access URLs)
    # 默认 Endpoint: https://{bucket-name}.oss-{region}.aliyuncs.com / Default endpoint
    # 自定义域名: https://cdn.yourdomain.com / Custom domain
    cdn-domain: ${ALIYUN_OSS_CDN_DOMAIN:}
    # 连接超时（毫秒）/ Connection timeout (ms)
    connection-timeout: ${ALIYUN_OSS_CONNECTION_TIMEOUT:5000}
    # Socket 超时（毫秒）/ Socket timeout (ms)
    socket-timeout: ${ALIYUN_OSS_SOCKET_TIMEOUT:50000}
    # 最大连接数 / Max connections
    max-connections: ${ALIYUN_OSS_MAX_CONNECTIONS:50}
    # 下载缓冲区大小（KB）/ Download buffer size (KB)
    download-buffer-size: ${ALIYUN_OSS_DOWNLOAD_BUFFER:64}
    # 上传分片大小（MB，用于大文件分片上传）/ Upload part size (MB, for multipart upload)
    upload-part-size: ${ALIYUN_OSS_UPLOAD_PART_SIZE:5}
    # 服务器端加密方式: AES256, KMS, SM4 / Server-side encryption: AES256, KMS, SM4
    # 留空表示不加密 / Leave empty for no encryption
    server-side-encryption: ${ALIYUN_OSS_SSE:}
    # KMS 密钥 ID（加密方式为 KMS 时使用）/ KMS key ID (used when encryption type is KMS)
    kms-key-id: ${ALIYUN_OSS_KMS_KEY_ID:}

# 日志 / Logging
logging:
  level:
    org.hibernate.SQL: ${LOG_HIBERNATE_LEVEL:DEBUG}
    edu.asu.ser594.resumeassistant: ${LOG_APP_LEVEL:DEBUG}

# ============================================
# RabbitMQ 消息队列配置 / RabbitMQ message queue configuration
# ============================================
