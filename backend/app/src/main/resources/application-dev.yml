# /backend/app/src/main/resources/application-dev.yml
spring:
  application:
    name: resume-assistant-backend

  # 数据源配置 PostgreSQL + pgvector
  datasource:
    url: jdbc:postgresql://localhost:5432/resume_assistant
    username: resume_user
    password: resume_pass
    driver-class-name: org.postgresql.Driver

  # H2 控制台（开发调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # 禁用 Flyway（H2 不需要）
  flyway:
    enabled: false

  # JWT（开发用固定密钥）
jwt:
  secret: dev-secret-key-at-least-32-characters-long
  access-token-expiration: 86400000      # 24小时（开发方便）
  refresh-token-expiration: 604800000    # 7天

# 日志
logging:
  level:
    org.hibernate.SQL: DEBUG
