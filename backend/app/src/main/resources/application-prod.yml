# /backend/app/src/main/resources/application-prod.yml
spring:
  # 数据库（从环境变量读取）
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/resume_assistant}
    username: ${SPRING_DATASOURCE_USERNAME:resume_user}
    password: ${SPRING_DATASOURCE_PASSWORD:resume_pass}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # RabbitMQ（从环境变量读取）
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

# 文件存储
file:
  storage:
    path: ${FILE_STORAGE_PATH:/app/uploads}

# JWT（从环境变量读取，必须设置）
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000       # 1小时
  refresh-token-expiration: 604800000    # 7天

# 日志
logging:
  level:
    root: INFO