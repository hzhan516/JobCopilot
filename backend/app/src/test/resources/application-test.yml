# Test Configuration
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

# 应用级配置 / Application-level configuration
app:
  redis:
    listener:
      enabled: false
  embedding:
    dimension: ${LLM_EMBEDDING_MODEL_DIMENSION:1536}
    model-version: ${LLM_EMBEDDING_MODEL:gemini/gemini-embedding-001}
  search:
    max-limit: ${SEARCH_MAX_LIMIT:100}
  captcha:
    enabled: false
  rabbitmq:
    queue:
      res:
        job-parse: backend.queue.job.parse
        resume-parse: backend.queue.resume.parse
        conversation: backend.queue.conversation
        job-rank: backend.queue.job.rank

# JWT Configuration
jwt:
  secret: testSecretKeyThatIsAtLeast32CharactersLongForTesting
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# Storage - use local storage for tests (no MinIO credentials required)
storage:
  type: local

# Logging
logging:
  level:
    io.jobcopilot.resumeassistant: DEBUG
    org.springframework.security: DEBUG
