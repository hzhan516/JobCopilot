# =============================================================================
# Language Switcher / 语言切换 / 語言切換
# English: docker-compose.en_US.yml | 简体中文: docker-compose.zh-Hans-CN.yml | 繁體中文: docker-compose.zh-Hant-TW.yml
# =============================================================================
# Resume Assistant - Docker Compose Configuration File
# Compatible with Docker and Podman
# =============================================================================
# Usage Instructions:
#   Docker:  docker-compose up -d
#   Podman:  podman-compose up -d  or  podman compose up -d
# =============================================================================

version: '3.8'

# =============================================================================
# Service Definitions
# =============================================================================
services:
  # ==========================================================================
  # 1. Frontend Service (Nginx + React)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    container_name: resume-assistant-frontend
    ports:
      - "80:80"
    networks:
      - resume-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits (optional, recommended for production)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M

  # ==========================================================================
  # 2. Backend Service (Java Spring Boot)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-assistant-backend
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/resume_assistant
      - SPRING_DATASOURCE_USERNAME=resume_user
      - SPRING_DATASOURCE_PASSWORD=resume_pass
      # RabbitMQ Configuration
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      # File Storage Path
      - FILE_STORAGE_PATH=/app/uploads
      # Use local file storage for local deployment to avoid dependency on undeployed MinIO
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_BASE_PATH=/app/uploads
      # JWT Secret (please use a strong key in production)
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      # Activate dev/prod profile
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      # Shared storage volume (resume files)
      - shared-storage:/app/uploads
    networks:
      - resume-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    # Health Check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # 3. AI Service (Python FastAPI)
  # ==========================================================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: resume-assistant-ai
    ports:
      - "8000:8000"
    environment:
      # RabbitMQ Configuration
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      # File Storage Path (shared with backend)
      - FILE_STORAGE_PATH=/app/uploads
      # Vertex AI Configuration (ADC credentials still required when running in container)
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-ser594-ai-service}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-us-central1}
      - GEMINI_TEXT_MODEL=${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      - GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - EMBEDDING_OUTPUT_DIMENSION=${EMBEDDING_OUTPUT_DIMENSION:-1536}
      # Log Level
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Shared Storage Volume (read-only access to resume files)
      - shared-storage:/app/uploads:ro
    networks:
      - resume-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    # AI service does not expose database, purely message-driven

  # ==========================================================================
  # 4. PostgreSQL 15 + pgvector (Unified storage for business data and vectors)
  # ==========================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: resume-assistant-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=resume_assistant
      - POSTGRES_USER=resume_user
      - POSTGRES_PASSWORD=resume_pass
    volumes:
      # Data Persistence
      - postgres-data:/var/lib/postgresql/data
      # Initialization Scripts (Flyway Migration Scripts)
      - ./backend/app/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    networks:
      - resume-network
    restart: unless-stopped
    # Health Check
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U resume_user -d resume_assistant" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # 5. RabbitMQ Message Queue
  # ==========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: resume-assistant-rabbitmq
    ports:
      - "5672:5672"     # AMQP Port
      - "15672:15672"   # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      # Increase message size limit (10MB, for passing vectors and resume summaries)
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit max_message_size 10485760
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - resume-network
    restart: unless-stopped
    # Health Check
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
# Network Configuration
# =============================================================================
networks:
  resume-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Volume Configuration
# =============================================================================
volumes:
  # PostgreSQL Data
  postgres-data:
    driver: local
  # RabbitMQ Data
  rabbitmq-data:
    driver: local
  # Shared Storage (Resume Files)
  shared-storage:
    driver: local
