name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────
  # Backend (Java / Maven / Spring Boot)
  # ───────────────────────────────────────────────
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, Test & Verify (JaCoCo)
        run: mvn verify --batch-mode

      - name: JaCoCo Coverage Report
        run: mvn jacoco:report --batch-mode

      - name: Upload Coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/**/target/site/jacoco/
          retention-days: 7

      - name: Architecture Tests (ArchUnit)
        run: mvn test --batch-mode -Dtest="*ArchitectureTest*"

  # ───────────────────────────────────────────────
  # Frontend (TypeScript / React / Vite)
  # ───────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check || echo "No type-check script defined"

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run || npm run test || npx vitest run

  # ───────────────────────────────────────────────
  # AI Service (Python / FastAPI)
  # ───────────────────────────────────────────────
  ai-service-build:
    name: AI Service Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Format Check with Black
        run: black --check . || echo "Black formatting issues found"

      - name: Test with pytest
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term
        continue-on-error: true

  # ───────────────────────────────────────────────
  # Security Scan
  # ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dependency Vulnerability Check (OWASP)
        run: |
          cd backend
          mvn verify --batch-mode -DskipTests
        continue-on-error: true

  # ───────────────────────────────────────────────
  # Docker Build Test
  # ───────────────────────────────────────────────
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        service: [backend, frontend, ai-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: jobcopilot/${{ matrix.service }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max