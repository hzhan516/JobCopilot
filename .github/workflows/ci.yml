name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ai-service/**'
      - '.github/workflows/**'
      - '.env.example'
      - 'docs/deployment/env-setup.html'
      - 'scripts/generate-env-setup.py'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'ai-service/**'
      - '.github/workflows/**'
      - '.env.example'
      - 'docs/deployment/env-setup.html'
      - 'scripts/generate-env-setup.py'

jobs:
  env-setup-check:
    name: Check env-setup.html is up-to-date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify env-setup.html matches .env.example
        run: |
          python scripts/generate-env-setup.py
          git diff --exit-code docs/deployment/env-setup.html || (
            echo "Error: docs/deployment/env-setup.html is out of date."
            echo "Please run 'python scripts/generate-env-setup.py' and commit the changes."
            exit 1
          )

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests
      run: mvn clean test -B --file pom.xml

    - name: Generate Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: backend/**/target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true

    - name: Upload Coverage Report
      uses: codecov/codecov-action@v4
      if: success()
      continue-on-error: true
      with:
        files: backend/**/target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella

  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run Integration Tests
      run: mvn clean verify -Pintegration-test -B --file pom.xml

  architecture-test:
    name: Architecture Compliance
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run Architecture Tests
      run: mvn test -pl app,domain -am -Dtest=**/architecture/*Test -Dsurefire.failIfNoSpecifiedTests=false -B --file pom.xml

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean package -DskipTests -B --file pom.xml
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: application-jar
        path: backend/app/target/*.jar
        retention-days: 7

  frontend-test:
    name: Frontend Lint & Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint

    - name: Run Tests
      run: npm run test:coverage

    - name: Upload Frontend Coverage Report
      uses: codecov/codecov-action@v4
      if: success()
      continue-on-error: true
      with:
        files: frontend/coverage/coverage-final.json
        flags: frontend
        name: codecov-frontend

    - name: Build
      run: npm run build
      env:
        VITE_GOOGLE_CLIENT_ID: dummy-ci-client-id.apps.googleusercontent.com

  ai-service-test:
    name: AI Service Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ai-service

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: ai-service/requirements.txt

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Tests
      run: pytest
      env:
        PYTHONPATH: .

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run SpotBugs
      run: mvn spotbugs:check -B --file pom.xml || true
    
    - name: Run Checkstyle
      run: mvn checkstyle:check -B --file pom.xml || true

  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, integration-test, frontend-test, ai-service-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-assistant-frontend:master-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID || 'dummy' }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-assistant-backend:master-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push AI Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-assistant-ai-service:master-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service
