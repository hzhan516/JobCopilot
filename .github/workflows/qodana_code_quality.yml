name: Qodana
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    # Skip Qodana for Dependabot PRs; dependency updates typically do not touch
    # business code, and running a full/static analysis on lockfile changes is
    # low-value while consuming CI minutes and Qodana quota.
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1568344467 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
