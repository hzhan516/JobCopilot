# -----------------------------------------------------------------------------
# Nightly OWASP dependency-check
# -----------------------------------------------------------------------------
# This workflow runs OWASP dependency-check independently from the regular CI
# pipeline. Dependency update PRs often trigger transient CVE false-positives,
# which would block day-to-day merges if run on every PR.
#
# Schedule: every Sunday at 02:00 UTC (low-traffic window).
# Results: uploaded as SARIF / HTML artifacts; failures create an issue.
# -----------------------------------------------------------------------------

name: Dependency Check Nightly

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP dependency-check
        working-directory: backend
        run: mvn verify --batch-mode -DskipTests

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 14
