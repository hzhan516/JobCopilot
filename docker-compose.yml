# =============================================================================
# Resume Assistant — Docker Compose Configuration
# =============================================================================
# Production-oriented three-tier Docker deployment.
# Only the frontend Nginx reverse proxy is exposed to the host.
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Tier 1 — Public-facing frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    image: resume-assistant-frontend
    container_name: resume-assistant-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-80}:8080"
    networks:
      - public-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  # ---------------------------------------------------------------------------
  # Tier 2 — Backend gateway
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: resume-assistant-backend
    container_name: resume-assistant-backend
    env_file:
      - .env
    environment:
      # Database
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-resume_assistant}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-resume_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-resume_pass}
      # RabbitMQ - support both dev and prod property names
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      # Storage
      - STORAGE_TYPE=${STORAGE_TYPE:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-resumes}
      - FILE_STORAGE_PATH=/app/uploads
      # App config
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      - LLM_EMBEDDING_MODEL_DIMENSION=${LLM_EMBEDDING_MODEL_DIMENSION:-1536}
      - AI_SERVICE_BASE_URL=http://ai-service:8000
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - CAPTCHA_ENABLED=${CAPTCHA_ENABLED:-true}
      - CAPTCHA_TOLERANCE=${CAPTCHA_TOLERANCE:-8}
      - CAPTCHA_TOKEN_EXPIRY=${CAPTCHA_TOKEN_EXPIRY:-300}
      - CAPTCHA_TRACK_WIDTH=${CAPTCHA_TRACK_WIDTH:-300}
      - CAPTCHA_MAX_ATTEMPTS=${CAPTCHA_MAX_ATTEMPTS:-5}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MANAGEMENT_HEALTH_MAIL_ENABLED=${MANAGEMENT_HEALTH_MAIL_ENABLED:-false}
    volumes:
      - shared-storage:/app/uploads
      - ./backend/logs:/app/backend/logs
    networks:
      - public-network
      - internal-network
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/actuator/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  # ---------------------------------------------------------------------------
  # Tier 2 — AI service
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: resume-assistant-ai-service
    container_name: resume-assistant-ai
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-ai-models}
      - FILE_STORAGE_PATH=/app/uploads
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-ser594-ai-service}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-global}
      - VERTEX_CREDENTIALS=/app/credentials/gcp-service-account.json
      - LLM_TEXT_MODEL=${LLM_TEXT_MODEL:-gemini/gemini-2.5-flash}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-gemini/gemini-2.5-flash}
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL:-gemini/gemini-embedding-001}
      - LLM_EMBEDDING_MODEL_DIMENSION=${LLM_EMBEDDING_MODEL_DIMENSION:-1536}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_REQUEST_TIMEOUT_SECONDS=${LLM_REQUEST_TIMEOUT_SECONDS:-60}
      - BACKEND_SERVICE_URL=${BACKEND_SERVICE_URL:-http://backend:8080}
      - BACKEND_QUERY_TIMEOUT=${BACKEND_QUERY_TIMEOUT:-5}
      - BACKEND_BATCH_UPSERT_TIMEOUT=${BACKEND_BATCH_UPSERT_TIMEOUT:-30}
      - BACKEND_BATCH_SIZE=${BACKEND_BATCH_SIZE:-100}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
    volumes:
      - shared-storage:/app/uploads:ro
      - ${VERTEX_CREDENTIALS:-./empty-vertex.json}:/app/credentials/gcp-service-account.json:ro
    networks:
      - internal-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
  # ---------------------------------------------------------------------------
  # Tier 2 — AI worker
  # ---------------------------------------------------------------------------
  ai-worker:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: resume-assistant-ai-service
    container_name: resume-assistant-ai-worker
    command: ["python", "-m", "app.worker_main"]
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_MODEL_BUCKET=${MINIO_MODEL_BUCKET:-ai-models}
      - BACKEND_SERVICE_URL=${BACKEND_SERVICE_URL:-http://backend:8080}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
    networks:
      - internal-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
  # ---------------------------------------------------------------------------
  # Tier 2 — Internal infrastructure
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: resume-assistant-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    networks:
      - internal-network
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio-setup:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: resume-assistant-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal-network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb -p myminio/${MINIO_BUCKET_NAME:-resumes};
      /usr/bin/mc mb -p myminio/${MINIO_MODEL_BUCKET:-ai-models};
      /usr/bin/mc policy set download myminio/${MINIO_BUCKET_NAME:-resumes};
      exit 0;
      "
  redis:
    image: public.ecr.aws/bitnami/redis:7.4.1-debian-12-r0
    container_name: resume-assistant-redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis-data:/bitnami/redis
    networks:
      - internal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
  rabbitmq:
    image: public.ecr.aws/docker/library/rabbitmq:3.13-management-alpine
    container_name: resume-assistant-rabbitmq
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit max_message_size 10485760
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  # ---------------------------------------------------------------------------
  # Tier 3 — Database
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./middleware/postgres
      dockerfile: Dockerfile
    image: resume-assistant-postgres:bitnami
    container_name: resume-assistant-postgres
    env_file:
      - .env
    environment:
      - POSTGRESQL_DATABASE=${POSTGRES_DB:-resume_assistant}
      - POSTGRESQL_USERNAME=${POSTGRES_USER:-resume_user}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD:-resume_pass}
    volumes:
      - postgres-data:/bitnami/postgresql
      - ./backend/app/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/templates/init.sql:ro
      - ./backend/app/src/main/resources/db/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resume_user} -d ${POSTGRES_DB:-resume_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
# =============================================================================
# Network configuration
# =============================================================================
networks:
  public-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.21.0.0/16
  internal-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.22.0.0/16
  db-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.23.0.0/16
# =============================================================================
# Volume configuration
# =============================================================================
volumes:
  postgres-data:
    driver: local
  rabbitmq-data:
    driver: local
  redis-data:
    driver: local
  shared-storage:
    driver: local
  minio-data:
    driver: local
