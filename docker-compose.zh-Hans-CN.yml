# =============================================================================
# Language Switcher / 语言切换 / 語言切換
# English: docker-compose.en_US.yml | 简体中文: docker-compose.zh-Hans-CN.yml | 繁體中文: docker-compose.zh-Hant-TW.yml
# =============================================================================
# 智能求职助手 - Docker Compose 配置文件
# 兼容 Docker 和 Podman
# =============================================================================
# 使用说明：
#   Docker:  docker-compose up -d
#   Podman:  podman-compose up -d  或  podman compose up -d
# =============================================================================

version: '3.8'

# =============================================================================
# 服务定义
# =============================================================================
services:
  # ==========================================================================
  # 1. 前端服务 (Nginx + React)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    container_name: resume-assistant-frontend
    ports:
      - "80:80"
    networks:
      - resume-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # 资源限制（可选，生产环境建议开启）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M

  # ==========================================================================
  # 2. 后端服务 (Java Spring Boot)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-assistant-backend
    ports:
      - "8080:8080"
    environment:
      # 数据库配置
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/resume_assistant
      - SPRING_DATASOURCE_USERNAME=resume_user
      - SPRING_DATASOURCE_PASSWORD=resume_pass
      # RabbitMQ 配置
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      # 文件存储路径
      - FILE_STORAGE_PATH=/app/uploads
      # 本地部署使用本地文件存储，避免依赖未部署的 MinIO
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_BASE_PATH=/app/uploads
      # JWT 密钥（生产环境请使用强密钥）
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-change-in-production}
      # 激活开发/生产配置
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      # 共享存储卷（简历文件）
      - shared-storage:/app/uploads
    networks:
      - resume-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # 3. AI 服务 (Python FastAPI)
  # ==========================================================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: resume-assistant-ai
    ports:
      - "8000:8000"
    environment:
      # RabbitMQ 配置
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      # 文件存储路径（与后端共享）
      - FILE_STORAGE_PATH=/app/uploads
      # Vertex AI 配置（容器化运行时仍需额外提供 ADC 凭证）
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-ser594-ai-service}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-us-central1}
      - GEMINI_TEXT_MODEL=${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      - GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - EMBEDDING_OUTPUT_DIMENSION=${EMBEDDING_OUTPUT_DIMENSION:-1536}
      # 日志级别
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # 共享存储卷（只读访问简历文件）
      - shared-storage:/app/uploads:ro
    networks:
      - resume-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    # AI 服务不暴露数据库，纯消息驱动

  # ==========================================================================
  # 4. PostgreSQL 15 + pgvector（业务和向量统一存储）
  # ==========================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: resume-assistant-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=resume_assistant
      - POSTGRES_USER=resume_user
      - POSTGRES_PASSWORD=resume_pass
    volumes:
      # 数据持久化
      - postgres-data:/var/lib/postgresql/data
      # 初始化脚本（Flyway 迁移脚本）
      - ./backend/app/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    networks:
      - resume-network
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U resume_user -d resume_assistant" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # 5. RabbitMQ 消息队列
  # ==========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: resume-assistant-rabbitmq
    ports:
      - "5672:5672"     # AMQP 端口
      - "15672:15672"   # 管理界面
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      # 增加消息大小限制（10MB，用于传递向量和简历简介）
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit max_message_size 10485760
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - resume-network
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
# 网络配置
# =============================================================================
networks:
  resume-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# 数据卷配置
# =============================================================================
volumes:
  # PostgreSQL 数据
  postgres-data:
    driver: local
  # RabbitMQ 数据
  rabbitmq-data:
    driver: local
  # 共享存储（简历文件）
  shared-storage:
    driver: local
