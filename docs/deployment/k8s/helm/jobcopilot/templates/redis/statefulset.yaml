{{- if and (eq .Values.global.infraMode "embedded") .Values.redis.enabled }}
# =============================================================================
# Redis StatefulSet (Official redis image)
# =============================================================================
# Uses official redis Docker image (Alpine variant).
# Supports both standard PVC mode and rootless emptyDir mode via
# global.rootlessMode flag.
# 使用官方 redis Docker 镜像（Alpine 变体）。
# 通过 global.rootlessMode 标志支持标准 PVC 模式和 rootless emptyDir 模式。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "jobcopilot.fullname" . }}-redis
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.redis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.redis.replicas }}
  serviceName: {{ include "jobcopilot.fullname" . }}-redis
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      {{- include "jobcopilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        {{- include "jobcopilot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "jobcopilot.serviceAccountName" . }}-redis
      securityContext:
        fsGroup: {{ .Values.redis.podSecurityContext.fsGroup }}
        fsGroupChangePolicy: {{ .Values.redis.podSecurityContext.fsGroupChangePolicy }}
      initContainers:
        {{- if .Values.global.rootlessMode }}
        # Rootless mode: create data dir with numeric UID ownership
        - name: volume-permissions
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data
              chown {{ .Values.redis.containerSecurityContext.runAsUser }}:{{ .Values.redis.containerSecurityContext.runAsGroup }} /data
              chmod 755 /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
        {{- else }}
        # Standard mode: ensure correct ownership on PVC
        - name: volume-permissions
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data
              chown {{ .Values.redis.containerSecurityContext.runAsUser }}:{{ .Values.redis.containerSecurityContext.runAsGroup }} /data || true
              chmod 755 /data || true
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
        {{- end }}
      containers:
        - name: redis
          image: "{{ if .Values.redis.image.registry }}{{ .Values.redis.image.registry }}/{{ end }}{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          env:
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "jobcopilot.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
          {{- if .Values.redis.auth.enabled }}
          command:
            - /bin/sh
            - -c
            - |
              exec redis-server --requirepass "$REDIS_PASSWORD"
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: {{ .Values.redis.containerSecurityContext.runAsUser }}
            runAsGroup: {{ .Values.redis.containerSecurityContext.runAsGroup }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        {{- if and .Values.global.rootlessMode (eq .Values.redis.persistence.type "emptyDir") }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if and (not .Values.global.rootlessMode) .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "jobcopilot.redis.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.redis.storage.accessMode }}
        {{- if .Values.redis.storage.storageClassName }}
        storageClassName: {{ .Values.redis.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
  {{- end }}
{{- end }}
