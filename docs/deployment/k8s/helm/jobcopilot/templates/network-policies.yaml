    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: minio
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080

