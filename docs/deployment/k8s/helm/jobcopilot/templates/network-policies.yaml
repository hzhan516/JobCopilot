{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Network Policies - three-tier isolation
# =============================================================================
{{- $fullname := include "jobcopilot.fullname" . }}
{{- $ns := include "jobcopilot.namespace" . }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-default-deny-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-default-deny-egress
  namespace: {{ $ns }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Frontend accepts ingress-controller traffic and calls backend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-frontend-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
      {{- include "jobcopilot.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080

---
# Backend accepts frontend and AI callback traffic, then calls internal dependencies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-backend-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "jobcopilot.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-service
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-worker
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rabbitmq
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5672
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-service
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000

---
# AI service accepts backend REST calls and reaches MQ, cache, backend, and MinIO.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-ai-service-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ai-service
      {{- include "jobcopilot.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rabbitmq
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5672
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: minio
              {{- include "jobcopilot.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 9000

---
