{{- if and (eq .Values.global.infraMode "embedded") .Values.rabbitmq.enabled }}
# =============================================================================
# RabbitMQ Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobcopilot.fullname" . }}-rabbitmq
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.rabbitmq.labels" . | nindent 4 }}
spec:
  type: {{ .Values.rabbitmq.service.type }}
  ports:
    - port: {{ .Values.rabbitmq.service.amqpPort }}
      targetPort: amqp
      protocol: TCP
      name: amqp
    - port: {{ .Values.rabbitmq.service.managementPort }}
      targetPort: management
      protocol: TCP
      name: management
  selector:
    app.kubernetes.io/component: rabbitmq
    {{- include "jobcopilot.selectorLabels" . | nindent 4 }}
{{- end }}
