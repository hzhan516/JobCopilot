{{- if .Values.backend.enabled }}
# =============================================================================
# Backend Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobcopilot.fullname" . }}-backend
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.backend.labels" . | nindent 4 }}
  {{- if .Values.observability.prometheus.serviceMonitor.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/api/actuator/prometheus"
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: backend
    {{- include "jobcopilot.selectorLabels" . | nindent 4 }}
{{- end }}
