{{- if and (eq .Values.global.infraMode "embedded") .Values.postgres.enabled }}
# =============================================================================
# PostgreSQL Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobcopilot.fullname" . }}-postgres
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.postgres.labels" . | nindent 4 }}
spec:
  type: {{ .Values.postgres.service.type }}
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/component: postgres
    {{- include "jobcopilot.selectorLabels" . | nindent 4 }}
{{- end }}
