{{- if .Values.aiService.enabled }}
# =============================================================================
# AI Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jobcopilot.fullname" . }}-ai-service
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.ai-service.labels" . | nindent 4 }}
  {{- if .Values.observability.prometheus.serviceMonitor.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: {{ .Values.aiService.service.type }}
  ports:
    - port: {{ .Values.aiService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: ai-service
    {{- include "jobcopilot.selectorLabels" . | nindent 4 }}
{{- end }}
