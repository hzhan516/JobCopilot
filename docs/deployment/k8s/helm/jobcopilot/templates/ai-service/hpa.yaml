{{- if and .Values.aiService.enabled .Values.aiService.autoscaling.enabled }}
# =============================================================================
# AI Service HorizontalPodAutoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "jobcopilot.fullname" . }}-ai-service
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.ai-service.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "jobcopilot.fullname" . }}-ai-service
  minReplicas: {{ .Values.aiService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.aiService.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.aiService.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.aiService.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.aiService.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.aiService.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
{{- end }}
