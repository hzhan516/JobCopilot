{{- if not .Values.secrets.existingSecret }}
# =============================================================================
# Secrets — Created by Helm (NOT recommended for production)
# Secrets — 由 Helm 创建（生产环境不推荐）
# =============================================================================
# For production, pre-create the Secret and set secrets.existingSecret.
# 生产环境请预先创建 Secret 并设置 secrets.existingSecret。
{{- $gcpCreds := .Values.secrets.gcpCredentialsJson | default "" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jobcopilot.secretName" . }}
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT / 认证
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}

  # Inter-service / 服务间通信
  INTERNAL_API_KEY: {{ .Values.secrets.internalApiKey | quote }}

  # PostgreSQL / PostgreSQL
  SPRING_DATASOURCE_USERNAME: {{ .Values.postgres.auth.username | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}

  # RabbitMQ / RabbitMQ
  SPRING_RABBITMQ_USERNAME: {{ .Values.rabbitmq.auth.username | quote }}
  SPRING_RABBITMQ_PASSWORD: {{ .Values.secrets.rabbitmqPassword | quote }}
  RABBITMQ_USERNAME: {{ .Values.rabbitmq.auth.username | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secrets.rabbitmqPassword | quote }}
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.auth.username | quote }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.secrets.rabbitmqPassword | quote }}

  # Redis / Redis
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}

  # AI Provider Keys / AI 提供商密钥
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}

  # SMTP / 邮件
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}

  # Storage / 存储
  AWS_S3_ACCESS_KEY: {{ .Values.secrets.storage.s3AccessKey | quote }}
  AWS_S3_SECRET_KEY: {{ .Values.secrets.storage.s3SecretKey | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.storage.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.storage.minioSecretKey | quote }}
  ALIYUN_OSS_ACCESS_KEY_ID: {{ .Values.secrets.storage.ossAccessKeyId | quote }}
  ALIYUN_OSS_ACCESS_KEY_SECRET: {{ .Values.secrets.storage.ossAccessKeySecret | quote }}

  # GCP Vertex AI / GCP Vertex AI
  VERTEX_PROJECT_ID: "jobcopilot-ai-service"
  VERTEX_LOCATION: "us-central1"
{{- if $gcpCreds }}
  VERTEX_CREDENTIALS: "/app/credentials/gcp-service-account.json"
{{- end }}
{{- if $gcpCreds }}
---
# GCP Service Account Key as a separate Secret for volume mounting
# GCP 服务账号密钥作为独立 Secret 用于卷挂载
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jobcopilot.fullname" . }}-gcp-credentials
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.labels" . | nindent 4 }}
type: Opaque
data:
  gcp-service-account.json: {{ $gcpCreds | b64enc | quote }}
{{- end }}
{{- end }}
