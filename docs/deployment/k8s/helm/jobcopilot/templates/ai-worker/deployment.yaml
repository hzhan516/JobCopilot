{{- if .Values.aiWorker.enabled }}
# =============================================================================
# AI Worker Deployment / background queue consumers and model training
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jobcopilot.fullname" . }}-ai-worker
  namespace: {{ include "jobcopilot.namespace" . }}
  labels:
    {{- include "jobcopilot.ai-worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: ai-worker
      {{- include "jobcopilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ai-worker
        {{- include "jobcopilot.selectorLabels" . | nindent 8 }}
      {{- with .Values.aiWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "jobcopilot.serviceAccountName" . }}-ai-worker
      securityContext:
        {{- toYaml .Values.aiWorker.podSecurityContext | nindent 8 }}
      containers:
        - name: ai-worker
          image: "{{ .Values.global.imageRegistry }}{{ .Values.aiWorker.image.repository }}:{{ .Values.aiWorker.image.tag }}"
          imagePullPolicy: {{ .Values.aiWorker.image.pullPolicy }}
          command:
            {{- toYaml .Values.aiWorker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "jobcopilot.fullname" . }}-config
            - secretRef:
                name: {{ include "jobcopilot.secretName" . }}
          env:
            - name: FILE_STORAGE_PATH
              value: "/app/uploads"
          {{- with .Values.aiWorker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          securityContext:
            {{- toYaml .Values.aiWorker.securityContext | nindent 12 }}
      volumes:
        - name: uploads
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
