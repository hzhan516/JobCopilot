# =============================================================================
# Resume Assistant — Helm Chart Default Values
# 智能求职助手 — Helm Chart 默认值
# =============================================================================
# This file configures the chart for development / local K8s testing.
# For production, override with values-production.yaml.
# 本文件用于开发/本地 K8s 测试环境。生产环境请使用 values-production.yaml 覆盖。

# ------------------------------------------------------------------------------
# Global Settings / 全局设置
# ------------------------------------------------------------------------------
global:
  # infraMode: embedded | managed
  #   embedded — Deploy PostgreSQL, RabbitMQ, Redis as StatefulSets inside K8s
  #   managed  — Use external managed services; skip middleware templates
  infraMode: embedded
  # rootlessMode: true | false
  #   true  — Use hostPath + initContainer for rootless container runtimes
  #           (e.g. rootless minikube, rootless containerd/Podman)
  #   false — Use standard PVC (default)
  rootlessMode: false

  # Image pull settings / 镜像拉取设置
  imageRegistry: ""
  imagePullSecrets: []

  # Common labels applied to all resources / 应用于所有资源的通用标签
  commonLabels: {}

  # Pod annotations / Pod 注解
  podAnnotations: {}

# ------------------------------------------------------------------------------
# Namespace / 命名空间
# ------------------------------------------------------------------------------
namespace:
  create: true
  name: jobcopilot

# ------------------------------------------------------------------------------
# Service Accounts / 服务账号
# ------------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}

# ------------------------------------------------------------------------------
# Secrets / 机密配置
# ------------------------------------------------------------------------------
# When existingSecret is set, the chart will NOT create the Secret and will
# reference the pre-created one. Recommended for production.
# 当设置了 existingSecret 时，Chart 不会创建 Secret，而是引用预创建的 Secret。
# 生产环境推荐此方式。
secrets:
  existingSecret: ""
  # If existingSecret is empty, the chart creates a Secret from the values below.
  # 如果 existingSecret 为空，Chart 会根据以下值创建 Secret。
  jwtSecret: "change-this-to-a-long-random-secret-at-least-32-characters"
  internalApiKey: ""
  postgresPassword: "resume_pass"
  rabbitmqPassword: "guest"
  redisPassword: ""
  geminiApiKey: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  smtpPassword: ""
  storage:
    s3AccessKey: ""
    s3SecretKey: ""
    minioAccessKey: "minioadmin"
    minioSecretKey: "minioadmin"
    ossAccessKeyId: ""
    ossAccessKeySecret: ""
  gcpCredentialsJson: ""

# ------------------------------------------------------------------------------
# Ingress / 入口
# ------------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  host: jobcopilot.local
  tls:
    enabled: false
    secretName: jobcopilot-tls

# ------------------------------------------------------------------------------
# Network Policies / 网络策略
# ------------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ------------------------------------------------------------------------------
# Pod Disruption Budget / Pod 中断预算
# ------------------------------------------------------------------------------
pdb:
  enabled: false

# ------------------------------------------------------------------------------
# Horizontal Pod Autoscaler / 水平 Pod 自动伸缩
# ------------------------------------------------------------------------------
autoscaling:
  enabled: false

# ------------------------------------------------------------------------------
# PostgreSQL (Official pgvector image, embedded mode only / 仅 embedded 模式)
# ------------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    registry: ""
    repository: pgvector/pgvector
    tag: pg15
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 5432
  resources: {}
  persistence:
    enabled: true
    type: pvc              # pvc | hostPath | emptyDir
    hostPath: ""           # Used when global.rootlessMode=true
  storage:
    size: 10Gi
    storageClassName: ""
    accessMode: ReadWriteOnce
  auth:
    username: resume_user
    database: resume_assistant
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ------------------------------------------------------------------------------
# RabbitMQ (Official image, embedded mode only / 仅 embedded 模式)
# ------------------------------------------------------------------------------
rabbitmq:
  enabled: true
  image:
    registry: public.ecr.aws
    repository: docker/library/rabbitmq
    tag: 3.13-management-alpine
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    amqpPort: 5672
    managementPort: 15672
  resources: {}
  persistence:
    enabled: true
    type: pvc
    hostPath: ""
  storage:
    size: 5Gi
    storageClassName: ""
    accessMode: ReadWriteOnce
  auth:
    username: guest
    maxMessageSize: 10485760
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ------------------------------------------------------------------------------
# Redis (Official image, embedded mode only / 仅 embedded 模式)
# ------------------------------------------------------------------------------
redis:
  enabled: true
  image:
    registry: public.ecr.aws
    repository: docker/library/redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 6379
  resources: {}
  persistence:
    enabled: true
    type: pvc
    hostPath: ""
  storage:
    size: 5Gi
    storageClassName: ""
    accessMode: ReadWriteOnce
  auth:
    enabled: false
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ------------------------------------------------------------------------------
# Backend / Java Spring Boot
# ------------------------------------------------------------------------------
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: localhost/jobcopilot-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  # Spring Boot profile / Spring Boot 配置文件
  springProfilesActive: dev
  # Storage configuration / 存储配置
  storageType: local
  # Managed middleware connection strings (used when global.infraMode=managed)
  # 托管中间件连接串（当 global.infraMode=managed 时使用）
  managed:
    postgresUrl: ""
    rabbitmqHost: ""
    rabbitmqPort: ""
    redisHost: ""
    redisPort: ""

# ------------------------------------------------------------------------------
# AI Service / Python FastAPI
# ------------------------------------------------------------------------------
aiService:
  enabled: true
  replicaCount: 1
  image:
    repository: localhost/jobcopilot-ai-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 1
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  # Model configuration / 模型配置
  llmTextModel: "gemini/gemini-2.5-flash"
  llmVisionModel: "gemini/gemini-2.5-flash"
  llmEmbeddingModel: "gemini/gemini-embedding-001"
  llmEmbeddingDimension: 1536
  llmTemperature: 0.1
  llmRequestTimeout: 60
  llmMaxTokens: 8192
  logLevel: INFO
  backendServiceUrl: "http://backend:8080"
  backendQueryTimeout: 5
  backendBatchUpsertTimeout: 30
  backendBatchSize: 100
  minioEndpoint: "http://minio:9000"
  minioModelBucket: "ai-models"

# ------------------------------------------------------------------------------
# Frontend / React + Nginx
# ------------------------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: localhost/jobcopilot-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources: {}
  pdb:
    enabled: false
    minAvailable: 1
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  # Build-time env vars baked into the image / 构建时注入的环境变量
  viteGoogleClientId: "your-google-oauth-client-id.apps.googleusercontent.com"
  viteApiBaseUrl: ""

# ------------------------------------------------------------------------------
# Observability / 可观测性
# ------------------------------------------------------------------------------
observability:
  prometheus:
    enabled: false
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
