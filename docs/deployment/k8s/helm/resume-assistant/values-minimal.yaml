# =============================================================================
# Resume Assistant — Minimal Resource Overrides
# 智能求职助手 — 最小资源覆盖值
# =============================================================================
# Optimized for single-node K8s clusters (kind, minikube, Docker Desktop).
# 针对单节点 K8s 集群优化（kind、minikube、Docker Desktop）。
#
# Usage:
#   helm install resume-assistant ./helm/resume-assistant \
#     -f ./helm/resume-assistant/values.yaml \
#     -f ./helm/resume-assistant/values-minimal.yaml

# ------------------------------------------------------------------------------
# Global / 全局
# ------------------------------------------------------------------------------
# Enable rootless mode for minikube / kind / Docker Desktop
# 为 minikube / kind / Docker Desktop 启用 rootless 模式
global:
  rootlessMode: true

# ------------------------------------------------------------------------------
# Secrets / 机密配置
# ------------------------------------------------------------------------------
# Use Helm-generated Secret for minikube dev environments
# 在 minikube 开发环境中使用 Helm 生成的 Secret
secrets:
  existingSecret: ""

# ------------------------------------------------------------------------------
# PostgreSQL / PostgreSQL
# ------------------------------------------------------------------------------
postgres:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    type: emptyDir
  storage:
    size: 5Gi

# ------------------------------------------------------------------------------
# RabbitMQ / RabbitMQ
# ------------------------------------------------------------------------------
rabbitmq:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  persistence:
    enabled: true
    type: emptyDir
  storage:
    size: 2Gi

# ------------------------------------------------------------------------------
# Redis / Redis
# ------------------------------------------------------------------------------
redis:
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  persistence:
    enabled: true
    type: emptyDir
  storage:
    size: 2Gi

# ------------------------------------------------------------------------------
# Backend / Java Spring Boot
# ------------------------------------------------------------------------------
backend:
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# ------------------------------------------------------------------------------
# AI Service / Python FastAPI
# ------------------------------------------------------------------------------
aiService:
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# ------------------------------------------------------------------------------
# Frontend / React + Nginx
# ------------------------------------------------------------------------------
frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

