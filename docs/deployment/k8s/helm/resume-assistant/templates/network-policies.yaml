{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# Network Policies — Three-tier isolation
# 网络策略 — 三层隔离
# =============================================================================
# Tier 1: Public ingress → frontend only
# Tier 2: Internal services (backend ↔ ai-service ↔ rabbitmq ↔ redis)
# Tier 3: Database — backend → postgres only

{{- $fullname := include "resume-assistant.fullname" . }}
{{- $ns := include "resume-assistant.namespace" . }}

# -----------------------------------------------------------------------------
# Default deny all ingress / 默认拒绝所有入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-default-deny-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# -----------------------------------------------------------------------------
# Default deny all egress (allow DNS) / 默认拒绝所有出站流量（允许 DNS）
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-default-deny-egress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution / 允许 DNS 解析
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# -----------------------------------------------------------------------------
# Tier 1 — Frontend: allow ingress from Ingress Controller
# Tier 1 — 前端：允许来自 Ingress Controller 的入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-frontend-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
  egress:
    # DNS / DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # To backend API / 访问后端 API
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080

---
# -----------------------------------------------------------------------------
# Tier 2 — Backend: allow ingress from frontend and ai-service
# Tier 2 — 后端：允许来自前端和 AI 服务的入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-backend-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-service
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS / DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # To postgres / 访问 PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    # To rabbitmq / 访问 RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rabbitmq
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5672
    # To redis / 访问 Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    # To ai-service / 访问 AI 服务
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-service
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000

---
# -----------------------------------------------------------------------------
# Tier 2 — AI Service: allow ingress from backend
# Tier 2 — AI 服务：允许来自后端的入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-ai-service-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ai-service
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS / DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # To rabbitmq / 访问 RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rabbitmq
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5672
    # To redis / 访问 Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    # To backend / 访问后端
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080

---
# -----------------------------------------------------------------------------
# Tier 2 — RabbitMQ: allow ingress from backend and ai-service
# Tier 2 — RabbitMQ：允许来自后端和 AI 服务的入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-rabbitmq-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: rabbitmq
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5672
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-service
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5672
  egress:
    # DNS only / 仅 DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# -----------------------------------------------------------------------------
# Tier 2 — Redis: allow ingress from backend and ai-service
# Tier 2 — Redis：允许来自后端和 AI 服务的入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-redis-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: redis
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ai-service
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
  egress:
    # DNS only / 仅 DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# -----------------------------------------------------------------------------
# Tier 3 — PostgreSQL: allow ingress from backend only
# Tier 3 — PostgreSQL：仅允许来自后端的入站流量
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-postgres-ingress
  namespace: {{ $ns }}
  labels:
    {{- include "resume-assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
              {{- include "resume-assistant.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # DNS only / 仅 DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
