{{- if .Values.frontend.enabled }}
# =============================================================================
# Frontend Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "resume-assistant.fullname" . }}-frontend
  namespace: {{ include "resume-assistant.namespace" . }}
  labels:
    {{- include "resume-assistant.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: frontend
    {{- include "resume-assistant.selectorLabels" . | nindent 4 }}
{{- end }}
