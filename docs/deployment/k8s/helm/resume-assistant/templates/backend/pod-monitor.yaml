{{- if and .Values.backend.enabled .Values.observability.prometheus.serviceMonitor.enabled }}
# =============================================================================
# Backend ServiceMonitor (Prometheus Operator)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "resume-assistant.fullname" . }}-backend
  namespace: {{ include "resume-assistant.namespace" . }}
  labels:
    {{- include "resume-assistant.backend.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /api/actuator/prometheus
      interval: {{ .Values.observability.prometheus.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.observability.prometheus.serviceMonitor.scrapeTimeout }}
{{- end }}
