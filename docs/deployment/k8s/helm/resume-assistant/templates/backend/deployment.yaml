{{- if .Values.backend.enabled }}
# =============================================================================
# Backend Deployment / Java Spring Boot
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "resume-assistant.fullname" . }}-backend
  namespace: {{ include "resume-assistant.namespace" . }}
  labels:
    {{- include "resume-assistant.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "resume-assistant.selectorLabels" . | nindent 8 }}
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "resume-assistant.serviceAccountName" . }}-backend
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.global.imageRegistry }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "resume-assistant.fullname" . }}-config
            - secretRef:
                name: {{ include "resume-assistant.secretName" . }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.backend.springProfilesActive | quote }}
            - name: FILE_STORAGE_PATH
              value: "/app/uploads"
            - name: LOCAL_STORAGE_BASE_PATH
              value: "/app/uploads"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: logs
              mountPath: /app/backend/logs
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
      volumes:
        - name: uploads
          emptyDir: {}
        - name: logs
          emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
