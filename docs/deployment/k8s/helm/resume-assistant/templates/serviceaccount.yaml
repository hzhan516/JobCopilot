{{- if .Values.serviceAccount.create }}
# =============================================================================
# Service Accounts / 服务账号
# =============================================================================
{{- $components := list "backend" "ai-service" "frontend" "postgres" "rabbitmq" "redis" }}
{{- range $components }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "resume-assistant.fullname" $ }}-{{ . }}
  namespace: {{ include "resume-assistant.namespace" $ }}
  labels:
    {{- include "resume-assistant.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ . }}
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- end }}
