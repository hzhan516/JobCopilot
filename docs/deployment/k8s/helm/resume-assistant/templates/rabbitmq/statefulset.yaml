{{- if and (eq .Values.global.infraMode "embedded") .Values.rabbitmq.enabled }}
# =============================================================================
# RabbitMQ StatefulSet (Official rabbitmq image)
# =============================================================================
# Uses official rabbitmq Docker image with management plugin.
# Supports both standard PVC mode and rootless emptyDir mode via
# global.rootlessMode flag.
# 使用官方 rabbitmq Docker 镜像（带 management 插件）。
# 通过 global.rootlessMode 标志支持标准 PVC 模式和 rootless emptyDir 模式。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "resume-assistant.fullname" . }}-rabbitmq
  namespace: {{ include "resume-assistant.namespace" . }}
  labels:
    {{- include "resume-assistant.rabbitmq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.rabbitmq.replicas }}
  serviceName: {{ include "resume-assistant.fullname" . }}-rabbitmq
  selector:
    matchLabels:
      app.kubernetes.io/component: rabbitmq
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: rabbitmq
        {{- include "resume-assistant.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "resume-assistant.serviceAccountName" . }}-rabbitmq
      securityContext:
        fsGroup: {{ .Values.rabbitmq.podSecurityContext.fsGroup }}
        fsGroupChangePolicy: {{ .Values.rabbitmq.podSecurityContext.fsGroupChangePolicy }}
      initContainers:
        {{- if .Values.global.rootlessMode }}
        # Rootless mode: create data dir with numeric UID ownership
        - name: volume-permissions
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/rabbitmq
              chown {{ .Values.rabbitmq.containerSecurityContext.runAsUser }}:{{ .Values.rabbitmq.containerSecurityContext.runAsGroup }} /var/lib/rabbitmq
              chmod 755 /var/lib/rabbitmq
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          securityContext:
            runAsUser: 0
        {{- else }}
        # Standard mode: ensure correct ownership on PVC
        - name: volume-permissions
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/rabbitmq
              chown {{ .Values.rabbitmq.containerSecurityContext.runAsUser }}:{{ .Values.rabbitmq.containerSecurityContext.runAsGroup }} /var/lib/rabbitmq || true
              chmod 755 /var/lib/rabbitmq || true
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          securityContext:
            runAsUser: 0
        {{- end }}
      containers:
        - name: rabbitmq
          image: "{{ if .Values.rabbitmq.image.registry }}{{ .Values.rabbitmq.image.registry }}/{{ end }}{{ .Values.rabbitmq.image.repository }}:{{ .Values.rabbitmq.image.tag }}"
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "resume-assistant.secretName" . }}
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "resume-assistant.secretName" . }}
                  key: RABBITMQ_DEFAULT_PASS
            - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
              value: "-rabbit max_message_size {{ .Values.rabbitmq.auth.maxMessageSize }}"
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          {{- with .Values.rabbitmq.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          securityContext:
            runAsUser: {{ .Values.rabbitmq.containerSecurityContext.runAsUser }}
            runAsGroup: {{ .Values.rabbitmq.containerSecurityContext.runAsGroup }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        {{- if and .Values.global.rootlessMode (eq .Values.rabbitmq.persistence.type "emptyDir") }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if and (not .Values.global.rootlessMode) .Values.rabbitmq.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "resume-assistant.rabbitmq.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.rabbitmq.storage.accessMode }}
        {{- if .Values.rabbitmq.storage.storageClassName }}
        storageClassName: {{ .Values.rabbitmq.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage.size }}
  {{- end }}
{{- end }}
