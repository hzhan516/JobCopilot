{{- if and (eq .Values.global.infraMode "embedded") .Values.postgres.enabled }}
# =============================================================================
# PostgreSQL StatefulSet (Official pgvector image)
# =============================================================================
# Uses official pgvector/pgvector image based on postgres Docker official image.
# Supports both standard PVC mode and rootless emptyDir mode via
# global.rootlessMode flag.
# 使用官方 pgvector 镜像（基于 postgres Docker 官方镜像）。
# 通过 global.rootlessMode 标志支持标准 PVC 模式和 rootless emptyDir 模式。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "resume-assistant.fullname" . }}-postgres
  namespace: {{ include "resume-assistant.namespace" . }}
  labels:
    {{- include "resume-assistant.postgres.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgres.replicas }}
  serviceName: {{ include "resume-assistant.fullname" . }}-postgres
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      {{- include "resume-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        {{- include "resume-assistant.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "resume-assistant.serviceAccountName" . }}-postgres
      securityContext:
        fsGroup: {{ .Values.postgres.podSecurityContext.fsGroup }}
        fsGroupChangePolicy: {{ .Values.postgres.podSecurityContext.fsGroupChangePolicy }}
      initContainers:
        {{- if .Values.global.rootlessMode }}
        # Rootless mode: create data dir with numeric UID ownership
        # 数字 UID chown 在 emptyDir 上不受 rootless user namespace 限制
        - name: volume-permissions
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data
              chown {{ .Values.postgres.containerSecurityContext.runAsUser }}:{{ .Values.postgres.containerSecurityContext.runAsGroup }} /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          securityContext:
            runAsUser: 0
        {{- else }}
        # Standard mode: ensure correct ownership on PVC
        - name: volume-permissions
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data
              chown {{ .Values.postgres.containerSecurityContext.runAsUser }}:{{ .Values.postgres.containerSecurityContext.runAsGroup }} /var/lib/postgresql/data || true
              chmod 700 /var/lib/postgresql/data || true
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          securityContext:
            runAsUser: 0
        {{- end }}
      containers:
        - name: postgresql
          image: "{{ if .Values.postgres.image.registry }}{{ .Values.postgres.image.registry }}/{{ end }}{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "resume-assistant.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            {{- if .Values.aiService.llmEmbeddingDimension }}
            - name: LLM_EMBEDDING_MODEL_DIMENSION
              value: {{ .Values.aiService.llmEmbeddingDimension | quote }}
            {{- end }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username }}
                - -d
                - {{ .Values.postgres.auth.database }}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username }}
                - -d
                - {{ .Values.postgres.auth.database }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with .Values.postgres.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            {{- if .Values.postgres.initSql }}
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: init-templates
              mountPath: /docker-entrypoint-initdb.d/templates
            {{- end }}
          securityContext:
            runAsUser: {{ .Values.postgres.containerSecurityContext.runAsUser }}
            runAsGroup: {{ .Values.postgres.containerSecurityContext.runAsGroup }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        {{- if .Values.postgres.initSql }}
        - name: init-scripts
          configMap:
            name: {{ include "resume-assistant.fullname" . }}-postgres-init
            items:
              - key: init-db.sh
                path: init-db.sh
                mode: 0755
        - name: init-templates
          configMap:
            name: {{ include "resume-assistant.fullname" . }}-postgres-init
            items:
              - key: init.sql
                path: init.sql
        {{- end }}
        {{- if and .Values.global.rootlessMode (eq .Values.postgres.persistence.type "emptyDir") }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if and (not .Values.global.rootlessMode) .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "resume-assistant.postgres.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.postgres.storage.accessMode }}
        {{- if .Values.postgres.storage.storageClassName }}
        storageClassName: {{ .Values.postgres.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
  {{- end }}
{{- end }}
