{{- if and (eq .Values.global.infraMode "embedded") .Values.postgres.enabled }}
# =============================================================================
# PostgreSQL Initialization ConfigMap
# PostgreSQL 初始化 ConfigMap
# =============================================================================
# Mounts init.sql and init-db.sh into /docker-entrypoint-initdb.d/
# 将 init.sql 和 init-db.sh 挂载到 /docker-entrypoint-initdb.d/
#
# NOTE: init.sql content should be provided via values or copied into the chart.
# 注意：init.sql 内容应通过 values 提供或复制到 Chart 目录中。
# Usage:
#   helm install ... --set-file postgres.initSql=backend/app/src/main/resources/db/init.sql
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "resume-assistant.fullname" . }}-postgres-init
  namespace: {{ include "resume-assistant.namespace" . }}
  labels:
    {{- include "resume-assistant.postgres.labels" . | nindent 4 }}
data:
  init-db.sh: |
    #!/bin/bash
    set -e
    # Resume Assistant - PostgreSQL initialization wrapper
    # 智能求职助手 - PostgreSQL 初始化包装脚本
    DIM=${LLM_EMBEDDING_MODEL_DIMENSION:-1536}
    TEMPLATE="/docker-entrypoint-initdb.d/templates/init.sql"
    if [ ! -f "$TEMPLATE" ]; then
        echo "ERROR: SQL template not found at $TEMPLATE"
        exit 1
    fi
    echo "============================================================"
    echo "Resume Assistant Database Initialization"
    echo "Embedding dimension from env: ${DIM}"
    echo "============================================================"
    PROCESSED=$(mktemp)
    sed "s/vector(1536)/vector(${DIM})/g" "$TEMPLATE" > "$PROCESSED"
    if [ "$DIM" != "1536" ] && sed 's/--.*$//' "$PROCESSED" | grep -q 'vector(1536)'; then
        echo "ERROR: Dimension substitution failed."
        rm -f "$PROCESSED"
        exit 1
    fi
    MATCHES=$(grep -c "vector(${DIM})" "$PROCESSED" || true)
    echo "Substitution verified: found ${MATCHES} occurrence(s) of vector(${DIM})."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" < "$PROCESSED"
    rm -f "$PROCESSED"
    echo "Database initialization completed with dimension: ${DIM}"
    if [ "$DIM" -le 2000 ]; then
        echo "Creating HNSW index for ${DIM}-dimensional vectors..."
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<EOF
    CREATE INDEX IF NOT EXISTS idx_job_vectors_embedding_hnsw ON job_vectors
        USING hnsw (embedding vector_cosine_ops)
        WITH (m = 16, ef_construction = 64);
    EOF
        echo "HNSW index created."
    else
        echo "WARNING: Dimension ${DIM} exceeds pgvector HNSW limit (2000). Skipping HNSW index."
    fi
{{- if .Values.postgres.initSql }}
  init.sql: |
{{ .Values.postgres.initSql | indent 4 }}
{{- end }}
{{- end }}
