# =============================================================================
# Resume Assistant — Production Overrides
# 智能求职助手 — 生产环境覆盖值
# =============================================================================
# Usage:
#   helm install resume-assistant ./helm/resume-assistant \
#     -f ./helm/resume-assistant/values.yaml \
#     -f ./helm/resume-assistant/values-production.yaml \
#     --namespace resume-assistant --create-namespace

# ------------------------------------------------------------------------------
# Global / 全局
# ------------------------------------------------------------------------------
global:
  # Production: use managed middleware for HA and maintenance-free operation
  # 生产环境：使用托管中间件以获得高可用和免运维
  infraMode: managed

# ------------------------------------------------------------------------------
# Secrets / 机密
# ------------------------------------------------------------------------------
# Production: create secrets OUTSIDE Helm (e.g. via kubectl, External Secrets,
# or Vault) and reference them here.
# 生产环境：在 Helm 外部创建 Secret（如通过 kubectl、External Secrets 或 Vault），
# 然后在此引用。
secrets:
  existingSecret: "resume-assistant-secrets"

# ------------------------------------------------------------------------------
# Ingress / 入口
# ------------------------------------------------------------------------------
ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # cert-manager: auto-issue TLS certificates / 自动颁发 TLS 证书
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: resume-assistant.example.com
  tls:
    enabled: true
    secretName: resume-assistant-tls

# ------------------------------------------------------------------------------
# Network Policy / 网络策略
# ------------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ------------------------------------------------------------------------------
# Pod Disruption Budget / Pod 中断预算
# ------------------------------------------------------------------------------
pdb:
  enabled: true

# ------------------------------------------------------------------------------
# Autoscaling / 自动伸缩
# ------------------------------------------------------------------------------
autoscaling:
  enabled: true

# ------------------------------------------------------------------------------
# PostgreSQL (disabled in production — use managed DB)
# PostgreSQL（生产环境禁用 — 使用托管数据库）
# ------------------------------------------------------------------------------
# Current production uses infraMode=managed; this is ignored.
# If switching to embedded mode (e.g. private cloud, rootless runtime),
# uncomment and configure below.
postgres:
  enabled: false
  # image:
  #   registry: docker.io
  #   repository: bitnami/postgresql
  #   tag: 15.10.0-debian-12-r0
  # persistence:
  #   enabled: true
  #   type: pvc        # Use hostPath for rootless environments
  # storage:
  #   size: 50Gi
  # auth:
  #   username: resume_user
  #   database: resume_assistant

# ------------------------------------------------------------------------------
# RabbitMQ (disabled in production — use managed MQ)
# RabbitMQ（生产环境禁用 — 使用托管消息队列）
# ------------------------------------------------------------------------------
rabbitmq:
  enabled: false
  # image:
  #   registry: docker.io
  #   repository: bitnami/rabbitmq
  #   tag: 3.13.7-debian-12-r0
  # persistence:
  #   enabled: true
  #   type: pvc
  # storage:
  #   size: 20Gi

# ------------------------------------------------------------------------------
# Redis (disabled in production — use managed cache)
# Redis（生产环境禁用 — 使用托管缓存）
# ------------------------------------------------------------------------------
redis:
  enabled: false
  # image:
  #   registry: docker.io
  #   repository: bitnami/redis
  #   tag: 7.4.1-debian-12-r0
  # persistence:
  #   enabled: true
  #   type: pvc
  # storage:
  #   size: 20Gi

# ------------------------------------------------------------------------------
# Backend / Java Spring Boot
# ------------------------------------------------------------------------------
backend:
  replicaCount: 3
  image:
    tag: stable
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 2
  springProfilesActive: prod
  # Storage: use S3-compatible object storage / 存储：使用兼容 S3 的对象存储
  storageType: s3
  # Managed middleware endpoints / 托管中间件端点
  managed:
    postgresUrl: "jdbc:postgresql://your-rds-endpoint:5432/resume_assistant"
    rabbitmqHost: "your-managed-mq.example.com"
    rabbitmqPort: "5672"
    redisHost: "your-managed-redis.example.com"
    redisPort: "6379"

# ------------------------------------------------------------------------------
# AI Service / Python FastAPI
# ------------------------------------------------------------------------------
aiService:
  replicaCount: 3
  image:
    tag: stable
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 2
  backendServiceUrl: "http://backend:8080"

# ------------------------------------------------------------------------------
# Frontend / React + Nginx
# ------------------------------------------------------------------------------
frontend:
  replicaCount: 3
  image:
    tag: stable
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  pdb:
    enabled: true
    minAvailable: 2

# ------------------------------------------------------------------------------
# Observability / 可观测性
# ------------------------------------------------------------------------------
observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
