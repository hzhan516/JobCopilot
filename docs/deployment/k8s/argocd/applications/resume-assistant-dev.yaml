# =============================================================================
# ArgoCD Application — Development Environment
# ArgoCD Application — 开发环境
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jobcopilot-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/jobcopilot.git
    targetRevision: develop
    path: docs/deployment/k8s/helm/jobcopilot
    helm:
      valueFiles:
        - values.yaml
        - values-minimal.yaml
      parameters:
        - name: namespace.name
          value: jobcopilot-dev
        - name: ingress.host
          value: dev.jobcopilot.local
  destination:
    server: https://kubernetes.default.svc
    namespace: jobcopilot-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
