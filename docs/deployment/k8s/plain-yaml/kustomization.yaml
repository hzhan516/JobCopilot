# =============================================================================
# Kustomize Base / Kustomize 基础层
# =============================================================================
# This is the base kustomization. Use overlays for environment-specific patches.
# 这是基础 kustomization。使用 overlay 进行环境特定的补丁。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: resume-assistant

resources:
  - base/namespace.yaml
  - base/configmap.yaml
  - base/secrets-placeholder.yaml
  - base/network-policies.yaml
  - base/ingress.yaml
  - base/postgres/service.yaml
  - base/postgres/statefulset.yaml
  - base/rabbitmq/service.yaml
  - base/rabbitmq/statefulset.yaml
  - base/redis/service.yaml
  - base/redis/statefulset.yaml
  - base/backend/service.yaml
  - base/backend/deployment.yaml
  - base/ai-service/service.yaml
  - base/ai-service/deployment.yaml
  - base/frontend/configmap-nginx.yaml
  - base/frontend/service.yaml
  - base/frontend/deployment.yaml

commonLabels:
  app.kubernetes.io/name: resume-assistant
  app.kubernetes.io/managed-by: kustomize
