# =============================================================================
# RabbitMQ Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: jobcopilot-rabbitmq
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: rabbitmq
spec:
  type: ClusterIP
  ports:
    - port: 5672
      targetPort: amqp
      name: amqp
    - port: 15672
      targetPort: management
      name: management
  selector:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: rabbitmq
