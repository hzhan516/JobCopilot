# =============================================================================
# PostgreSQL Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: jobcopilot-postgres
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: postgres
