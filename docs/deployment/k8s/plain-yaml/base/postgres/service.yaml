# =============================================================================
# PostgreSQL Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: resume-assistant-postgres
  namespace: resume-assistant
  labels:
    app.kubernetes.io/name: resume-assistant
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    app.kubernetes.io/name: resume-assistant
    app.kubernetes.io/component: postgres
