# =============================================================================
# AI Worker Deployment / background training and queue consumers
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobcopilot-ai-worker
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: ai-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jobcopilot
      app.kubernetes.io/component: ai-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jobcopilot
        app.kubernetes.io/component: ai-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-worker
          image: jobcopilot-ai-service:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker_main"]
          envFrom:
            - configMapRef:
                name: jobcopilot-config
            - secretRef:
                name: jobcopilot-secrets
          env:
            - name: FILE_STORAGE_PATH
              value: "/app/uploads"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: uploads
          emptyDir: {}
