# =============================================================================
# Global ConfigMap — Non-sensitive environment variables
# 全局 ConfigMap — 非敏感环境变量
# =============================================================================
# NOTE: Adjust service addresses for your environment.
# 注意：请根据你的环境调整服务地址。
apiVersion: v1
kind: ConfigMap
metadata:
  name: resume-assistant-config
  namespace: resume-assistant
  labels:
    app.kubernetes.io/name: resume-assistant
    app.kubernetes.io/component: config
data:
  SPRING_PROFILES_ACTIVE: "dev"
  SPRING_APPLICATION_NAME: "resume-assistant-backend"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://resume-assistant-postgres:5432/resume_assistant"
  SPRING_RABBITMQ_HOST: "resume-assistant-rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  REDIS_HOST: "resume-assistant-redis"
  REDIS_PORT: "6379"
  AI_SERVICE_BASE_URL: "http://resume-assistant-ai-service:8000"
  BACKEND_SERVICE_URL: "http://resume-assistant-backend:8080"
  LLM_EMBEDDING_MODEL_DIMENSION: "1536"
  LLM_EMBEDDING_MODEL: "gemini/gemini-embedding-001"
  LLM_TEXT_MODEL: "gemini/gemini-2.5-flash"
  LLM_VISION_MODEL: "gemini/gemini-2.5-flash"
  LLM_TEMPERATURE: "0.1"
  LLM_REQUEST_TIMEOUT_SECONDS: "60"
  LLM_MAX_TOKENS: "8192"
  LOG_LEVEL: "INFO"
  BACKEND_QUERY_TIMEOUT: "5"
  BACKEND_BATCH_UPSERT_TIMEOUT: "30"
  BACKEND_BATCH_SIZE: "100"
  CAPTCHA_ENABLED: "true"
  CAPTCHA_TOLERANCE: "8"
  CAPTCHA_TOKEN_EXPIRY: "300"
  CAPTCHA_TRACK_WIDTH: "300"
  CAPTCHA_MAX_ATTEMPTS: "5"
  STORAGE_TYPE: "local"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_MODEL_BUCKET: "ai-models"
  SEARCH_MAX_LIMIT: "100"
  MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
