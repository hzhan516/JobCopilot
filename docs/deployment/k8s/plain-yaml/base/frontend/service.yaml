# =============================================================================
# Frontend Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: jobcopilot-frontend
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: frontend
