# =============================================================================
# AI Service Deployment / Python FastAPI
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobcopilot-ai-service
  namespace: jobcopilot
  labels:
    app.kubernetes.io/name: jobcopilot
    app.kubernetes.io/component: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jobcopilot
      app.kubernetes.io/component: ai-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jobcopilot
        app.kubernetes.io/component: ai-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-service
          image: jobcopilot-ai-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: jobcopilot-config
            - secretRef:
                name: jobcopilot-secrets
          env:
            - name: FILE_STORAGE_PATH
              value: "/app/uploads"
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: uploads
          emptyDir: {}
