# =============================================================================
# Production Overlay / 生产环境 Overlay
# =============================================================================
# Usage:
#   kubectl apply -k docs/deployment/k8s/plain-yaml/overlays/production/
#
# NOTE: This overlay assumes managed middleware (no postgres/rabbitmq/redis
# in-cluster). Remove the StatefulSet patches if you run middleware in-cluster.
# 注意：此 overlay 假设使用托管中间件（集群内无 postgres/rabbitmq/redis）。
# 如果你在集群内运行中间件，请删除 StatefulSet 补丁。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jobcopilot-prod

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

patches:
  - target:
      kind: Ingress
      name: jobcopilot
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: jobcopilot.example.com
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - jobcopilot.example.com
            secretName: jobcopilot-tls
  - target:
      kind: Deployment
      name: jobcopilot-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
  - target:
      kind: Deployment
      name: jobcopilot-ai-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
  - target:
      kind: Deployment
      name: jobcopilot-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
