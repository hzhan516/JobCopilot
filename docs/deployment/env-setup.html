    let currentLang = localStorage.getItem('env-setup-lang') || 'en';
    if (!translations[currentLang]) currentLang = 'en';

    function t(key, vars) {
      let text = translations[currentLang][key] || translations.en[key] || key;
      if (vars) {
        for (const [k, v] of Object.entries(vars)) {
          text = text.replace(new RegExp('\\{' + k + '\\}', 'g'), v);
        }
      }
      return text;
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
          if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
            el.placeholder = t(key);
          } else {
            el.textContent = t(key);
          }
        }
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        el.placeholder = t(key);
      });
      document.getElementById('lang-select').value = currentLang;
    }

    // ============================================================
    // 2. 环境变量解析器 / Env Parser
    // ============================================================
    function parseEnvExample(template) {
      const lines = template.split('\n');
      const sections = [];
      let currentSection = null;
      let commentBuffer = [];
      let lastWasBlank = false;

      function flushSection() {
        if (currentSection && (currentSection.variables.length > 0 || currentSection.title)) {
          sections.push(currentSection);
        }
      }

      function startNewSection(title, desc) {
        flushSection();
        currentSection = { title: title || '', description: desc || '', variables: [] };
        commentBuffer = [];
      }

      // Detect if a line is a section header
      function isSectionHeader(line) {
        // Patterns like "# ======..." or "# TIER 0: ..." or "# -----------------------------------------------------------------------------"
        return /^#\s*={5,}/.test(line) || /^#\s*-{5,}/.test(line) || /^#\s*TIER\s+\d/i.test(line);
      }

      // Extract a section title from a comment line
      function extractSectionTitle(line) {
        const m = line.match(/^#\s*={5,}\s*(.*?)\s*={5,}$/);
        if (m) return m[1].trim();
        const m2 = line.match(/^#\s*(TIER\s+\d+[:：]\s*.*)$/i);
        if (m2) return m2[1].trim();
        const m3 = line.match(/^#\s*(\d+\.\d+\s+.*)$/);
        if (m3) return m3[1].trim();
        return '';
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trimEnd();

        if (isSectionHeader(trimmed)) {
          // Look ahead for a title in next non-header comment line
          let title = extractSectionTitle(trimmed);
          let j = i + 1;
          while (j < lines.length && !lines[j].trim().startsWith('# =') && !lines[j].trim().startsWith('# -')) {
            if (lines[j].trim().startsWith('#') && !lines[j].trim().startsWith('# =') && !lines[j].trim().startsWith('# -')) {
              const possible = lines[j].trim().replace(/^#\s*/, '');
              if (possible && !possible.startsWith('=') && !possible.startsWith('-')) {
                title = possible;
                break;
              }
            }
            j++;
          }
          startNewSection(title, commentBuffer.join('\n'));
          commentBuffer = [];
          lastWasBlank = false;
          continue;
        }

        if (trimmed === '' || /^\s*$/.test(trimmed)) {
          if (commentBuffer.length > 0 && !lastWasBlank) {
            // Keep blank line as separator in comments
            commentBuffer.push('');
          }
          lastWasBlank = true;
          continue;
        }

        lastWasBlank = false;

        if (trimmed.startsWith('#')) {
          const content = trimmed.replace(/^#\s?/, '');
          commentBuffer.push(content);
          continue;
        }

        // Try to parse KEY=value
        const kvMatch = trimmed.match(/^([A-Za-z_][A-Za-z0-9_]*)=(.*)$/);
        if (kvMatch) {
          const key = kvMatch[1];
          let rawValue = kvMatch[2];
          let displayValue = rawValue;

          // Handle quoted values
          const hasQuotes = /^(["'])(.*)\1$/.test(rawValue);
          if (hasQuotes) {
            displayValue = rawValue.slice(1, -1);
          } else {
            // Strip inline comment: first unquoted #
            const hashIdx = rawValue.indexOf('#');
            if (hashIdx >= 0) {
              rawValue = rawValue.slice(0, hashIdx).trimEnd();
              displayValue = rawValue;
            }
          }

          const isSecret = /SECRET|PASSWORD|PASS|KEY|TOKEN|CREDENTIALS/i.test(key);
          const isRequired = isSecret || ['JWT_SECRET', 'INTERNAL_API_KEY', 'VITE_GOOGLE_CLIENT_ID', 'GEMINI_API_KEY'].includes(key);
          const isRecommended = ['POSTGRES_PASSWORD', 'RABBITMQ_PASSWORD', 'MINIO_SECRET_KEY'].includes(key);

          // Split comments by language
          const hasChineseRegex = /[\u4e00-\u9fff]/;
          const enLines = [];
          const zhLines = [];
          for (const cLine of commentBuffer) {
            if (hasChineseRegex.test(cLine)) {
              zhLines.push(cLine);
            } else {
              enLines.push(cLine);
            }
          }

          currentSection = currentSection || { title: '', description: '', variables: [] };
          currentSection.variables.push({
            key,
            rawValue,
            displayValue,
            description: commentBuffer.join('\n').trim(),
            descriptionEn: enLines.join('\n').trim(),
            descriptionZh: zhLines.join('\n').trim(),
            isSecret,
            isRequired,
            isRecommended,
            lineIndex: i
          });
          commentBuffer = [];
        }
      }

      flushSection();

      // Filter out empty sections and merge orphaned variables into a default section
      const result = [];
      let defaultSection = null;
      for (const sec of sections) {
        if (sec.variables.length > 0) {
          if (!sec.title && !defaultSection) {
            sec.title = 'General';
            defaultSection = sec;
          }
          result.push(sec);
        }
      }
      return result;
    }

    // ============================================================
    // 3. 状态管理 / State
    // ============================================================
    let parsedSections = [];
    let currentValues = {}; // key -> current input value
    let searchQuery = '';

    // ============================================================
    // 4. 随机生成器 / Secret Generator
    // ============================================================
    function generateSecret(length) {
      const bytes = new Uint8Array(length);
      window.crypto.getRandomValues(bytes);
      return btoa(String.fromCharCode(...bytes)).replace(/[+/=]/g, '').slice(0, length);
    }

    // ============================================================
    // 5. 渲染 / Rendering
    // ============================================================
    function render() {
      renderNav();
      renderSections();
      renderProgress();
      renderPreview();
    }

    function renderNav() {
      const nav = document.getElementById('section-nav');
      nav.innerHTML = '';
      parsedSections.forEach((sec, idx) => {
        const visibleVars = sec.variables.filter(v => matchesSearch(v));
        if (visibleVars.length === 0 && searchQuery) return;

        const btn = document.createElement('button');
        btn.className = 'section-nav-item w-full text-left px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 transition-colors';
        btn.innerHTML = `<span class="font-medium">${escapeHtml(sec.title || t('general'))}</span><span class="ml-2 text-xs text-gray-400">${t('varsCount', {n: visibleVars.length})}</span>`;
        btn.onclick = () => {
          document.getElementById('section-' + idx).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        nav.appendChild(btn);
      });
    }

    function matchesSearch(v) {
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return v.key.toLowerCase().includes(q) || (v.description && v.description.toLowerCase().includes(q));
    }

    function renderSections() {
      const container = document.getElementById('sections-container');
      container.innerHTML = '';

      let hasAnyVisible = false;
      parsedSections.forEach((sec, secIdx) => {
        const visibleVars = sec.variables.filter(v => matchesSearch(v));
        if (visibleVars.length === 0 && searchQuery) return;
        hasAnyVisible = true;

        const sectionEl = document.createElement('div');
        sectionEl.id = 'section-' + secIdx;
        sectionEl.className = 'bg-white rounded-xl border shadow-sm overflow-hidden';

        // Header
        const header = document.createElement('div');
        header.className = 'px-5 py-4 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors';
        header.innerHTML = `
          <div class="flex items-center space-x-3">
            <svg class="w-5 h-5 text-blue-600 transform transition-transform accordion-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            <h3 class="font-semibold text-gray-900">${escapeHtml(sec.title || t('general'))}</h3>
            <span class="text-xs text-gray-500">${t('varsCount', {n: visibleVars.length})}</span>
          </div>
        `;

        const body = document.createElement('div');
        body.className = 'px-5 pb-5 accordion-content';
        body.style.maxHeight = secIdx < 2 ? 'none' : '0px';
        body.style.opacity = secIdx < 2 ? '1' : '0';
        body.style.overflow = 'hidden';

        // Toggle
        let expanded = secIdx < 2;
        header.onclick = () => {
          expanded = !expanded;
          const icon = header.querySelector('.accordion-icon');
          if (expanded) {
            body.style.maxHeight = body.scrollHeight + 'px';
            body.style.opacity = '1';
            icon.style.transform = 'rotate(180deg)';
          } else {
            body.style.maxHeight = '0px';
            body.style.opacity = '0';
            icon.style.transform = 'rotate(0deg)';
          }
        };
        // Init icon rotation for first two
        if (secIdx < 2) {
          header.querySelector('.accordion-icon').style.transform = 'rotate(180deg)';
        }

        // Variables
        visibleVars.forEach(v => {
          const val = currentValues[v.key] !== undefined ? currentValues[v.key] : v.displayValue;
          const isEmpty = val === '';
          const showWarning = v.isRequired && isEmpty;
          const showRec = v.isRecommended && isEmpty && !v.isRequired;

          const row = document.createElement('div');
          row.className = 'py-4 border-t border-gray-100 first:border-t-0';
          row.dataset.key = v.key;

          const inputType = v.isSecret ? 'password' : 'text';
          const secretToggle = v.isSecret ? `
            <button type="button" class="secret-toggle px-3 py-2 text-sm text-gray-500 hover:text-gray-700 border-l border-gray-200" data-key="${v.key}">
              ${t('showPassword')}
            </button>
          ` : '';

          const generateBtn = v.isSecret ? `
            <button type="button" class="generate-btn ml-2 px-3 py-1.5 text-xs font-medium bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md transition-colors flex items-center space-x-1" data-key="${v.key}">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
              <span>${t('generate')}</span>
            </button>
          ` : '';

          const badge = v.isRequired
            ? `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">${t('required')}</span>`
            : v.isRecommended
            ? `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-yellow-100 text-yellow-800">${t('recommended')}</span>`
            : `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600">${t('optional')}</span>`;

          const warningHtml = showWarning
            ? `<p class="mt-1.5 text-xs text-red-600 flex items-center"><svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${t('validationRequired')}</p>`
            : showRec
            ? `<p class="mt-1.5 text-xs text-yellow-600 flex items-center"><svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${t('validationRecommended')}</p>`
            : '';

          // Select description based on language
          let descToShow = '';
          if (currentLang === 'en') {
            descToShow = v.descriptionEn || v.description;
          } else {
            const extra = extraDescriptions[currentLang] && extraDescriptions[currentLang][v.key];
            descToShow = extra || v.descriptionZh || v.descriptionEn || v.description;
          }
          const descHtml = descToShow
            ? `<div class="mt-2 text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${formatDescription(descToShow)}</div>`
            : '';

          const defaultBadge = (!isEmpty && val !== v.displayValue)
            ? `<button type="button" class="restore-default text-xs text-blue-600 hover:text-blue-800 underline ml-2" data-key="${v.key}" data-default="${escapeHtml(v.displayValue)}">${t('defaultValue')}: ${escapeHtml(v.displayValue || t('emptyValue'))}</button>`
            : '';

          row.innerHTML = `
            <div class="flex items-start justify-between mb-1.5">
              <label class="text-sm font-semibold text-gray-900 flex items-center flex-wrap">
                <code class="code-block text-blue-700 bg-blue-50 px-1.5 py-0.5 rounded">${escapeHtml(v.key)}</code>
                ${badge}
                ${defaultBadge}
              </label>
              ${generateBtn}
            </div>
            <div class="relative flex">
              <input type="${inputType}" 
                value="${escapeHtml(val)}"
                data-key="${v.key}"
                class="var-input flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm ${v.isSecret ? 'secret-input' : ''} ${showWarning ? 'border-red-300 bg-red-50' : showRec ? 'border-yellow-300 bg-yellow-50' : ''}"
                placeholder="${v.displayValue ? '' : t('emptyValue')}">
              ${secretToggle}
            </div>
            ${warningHtml}
            ${descHtml}
          `;

          body.appendChild(row);
        });

        sectionEl.appendChild(header);
        sectionEl.appendChild(body);
        container.appendChild(sectionEl);

        // After appending, set proper max-height for expanded sections
        if (secIdx < 2) {
          body.style.maxHeight = body.scrollHeight + 'px';
        }
      });

      if (!hasAnyVisible) {
        container.innerHTML = `<div class="text-center py-12 text-gray-500">${t('noResults')}</div>`;
      }

      attachInputListeners();
    }

    function formatDescription(desc) {
      // Convert URLs to links
      return escapeHtml(desc).replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" class="text-blue-600 hover:underline">$1</a>'
      );
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function attachInputListeners() {
      // Input changes
      document.querySelectorAll('.var-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const key = e.target.dataset.key;
          currentValues[key] = e.target.value;
          renderProgress();
          renderPreview();
          // Re-render only validation UI for this row to avoid full re-render
          updateRowValidation(key);
        });
      });

      // Secret toggles
      document.querySelectorAll('.secret-toggle').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const key = e.target.closest('.secret-toggle').dataset.key;
          const input = document.querySelector(`.var-input[data-key="${key}"]`);
          if (input) {
            input.type = input.type === 'password' ? 'text' : 'password';
            e.target.closest('.secret-toggle').textContent = input.type === 'password' ? t('showPassword') : t('hidePassword');
          }
        });
      });

      // Generate buttons
      document.querySelectorAll('.generate-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const key = e.target.closest('.generate-btn').dataset.key;
          const newVal = generateSecret(48);
          currentValues[key] = newVal;
          const input = document.querySelector(`.var-input[data-key="${key}"]`);
          if (input) {
            input.value = newVal;
            input.type = 'text'; // briefly show it
            setTimeout(() => { if (input.type === 'text') input.type = 'password'; }, 2000);
          }
          renderProgress();
          renderPreview();
          updateRowValidation(key);
        });
      });

      // Restore defaults
      document.querySelectorAll('.restore-default').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const key = e.target.dataset.key;
          const defVal = e.target.dataset.default;
          currentValues[key] = defVal;
          const input = document.querySelector(`.var-input[data-key="${key}"]`);
          if (input) input.value = defVal;
          renderProgress();
          renderPreview();
          updateRowValidation(key);
        });
      });
    }

    function updateRowValidation(key) {
      const row = document.querySelector(`div[data-key="${key}"]`);
      if (!row) return;
      const v = parsedSections.flatMap(s => s.variables).find(x => x.key === key);
      if (!v) return;
      const val = currentValues[key] !== undefined ? currentValues[key] : v.displayValue;
      const isEmpty = val === '';
      const showWarning = v.isRequired && isEmpty;
      const showRec = v.isRecommended && isEmpty && !v.isRequired;

      const input = row.querySelector('.var-input');
      input.classList.remove('border-red-300', 'bg-red-50', 'border-yellow-300', 'bg-yellow-50');
      if (showWarning) {
        input.classList.add('border-red-300', 'bg-red-50');
      } else if (showRec) {
        input.classList.add('border-yellow-300', 'bg-yellow-50');
      }

      // Update warning message
      let warnEl = row.querySelector('.validation-msg');
      if (!warnEl) {
        warnEl = document.createElement('p');
        warnEl.className = 'validation-msg mt-1.5 text-xs flex items-center';
        input.parentNode.parentNode.insertBefore(warnEl, input.parentNode.nextSibling);
      }
      if (showWarning) {
        warnEl.className = 'validation-msg mt-1.5 text-xs text-red-600 flex items-center';
        warnEl.innerHTML = `<svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${t('validationRequired')}`;
        warnEl.style.display = '';
      } else if (showRec) {
        warnEl.className = 'validation-msg mt-1.5 text-xs text-yellow-600 flex items-center';
        warnEl.innerHTML = `<svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${t('validationRecommended')}`;
        warnEl.style.display = '';
      } else {
        warnEl.style.display = 'none';
      }
    }

    function renderProgress() {
      const allVars = parsedSections.flatMap(s => s.variables);
      const requiredVars = allVars.filter(v => v.isRequired);
      const filledRequired = requiredVars.filter(v => {
        const val = currentValues[v.key] !== undefined ? currentValues[v.key] : v.displayValue;
        return val !== '';
      }).length;

      const pct = requiredVars.length > 0 ? Math.round((filledRequired / requiredVars.length) * 100) : 100;

      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-bar-large').style.width = pct + '%';
      document.getElementById('progress-text').textContent = t('progressShort', {filled: filledRequired, total: requiredVars.length});
      document.getElementById('progress-detail').textContent = t('progressDetail', {filled: filledRequired, total: requiredVars.length});
    }

    function renderPreview() {
      const lines = [];
      parsedSections.forEach(sec => {
        if (sec.title) {
          lines.push('# ' + '='.repeat(60));
          lines.push('# ' + sec.title);
          lines.push('# ' + '='.repeat(60));
        }
        sec.variables.forEach(v => {
          const val = currentValues[v.key] !== undefined ? currentValues[v.key] : v.displayValue;
          if (v.description) {
            v.description.split('\n').forEach(d => {
              lines.push('# ' + d);
            });
          }
          lines.push(v.key + '=' + val);
          lines.push('');
        });
      });
      document.getElementById('env-preview').value = lines.join('\n');
    }

    // ============================================================
    // 6. 下载与重置 / Download & Reset
    // ============================================================
    document.getElementById('btn-download').addEventListener('click', () => {
      const content = document.getElementById('env-preview').value;
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '.env';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      if (!confirm(t('resetConfirm'))) return;
      currentValues = {};
      render();
    });

    // ============================================================
    // 7. 搜索 / Search
    // ============================================================
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      render();
    });

    // ============================================================
    // 8. 语言切换 / Language Switch
    // ============================================================
    document.getElementById('lang-select').addEventListener('change', (e) => {
      currentLang = e.target.value;
      localStorage.setItem('env-setup-lang', currentLang);
      applyTranslations();
      render();
    });

    // ============================================================
    // 9. 初始化 / Initialization
    // ============================================================
    try {
      const template = window.ENV_EXAMPLE_TEMPLATE;
      if (template === "PLACEHOLDER_WILL_BE_REPLACED_BY_GENERATE_SCRIPT") {
        document.body.innerHTML = '<div class="p-8 text-center text-red-600">Error: env-setup.html has not been initialized. Please run <code>python scripts/generate-env-setup.py</code></div>';
      } else {
        parsedSections = parseEnvExample(template);
        applyTranslations();
        render();
      }
    } catch (err) {
      document.body.innerHTML = '<div class="p-8 text-center text-red-600">Error parsing environment template: ' + escapeHtml(err.message) + '</div>';
    }
  </script>
</body>
</html>
